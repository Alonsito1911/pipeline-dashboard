    <section><div class="sec-h"><h2>B1 · Resultado por cadena</h2></div><div class="card">${grouped(grpCat('destino_final','creacion_nuevos'))}</div></section>
    <section><div class="sec-h"><h2>B2 · Estado del staging</h2></div><div class="card">
      ${barsBlock(R.filter(r=>r[3]==='creacion_estado').map(r=>[r[4],r[5]]), 'var(--s2)')}</div></section>
    <section><div class="sec-h"><h2>B3 · Combos de fuentes por canónico nuevo</h2></div>
      <div class="card">${barsBlock(combos('creacion_canonicos'),'var(--s1)',true)}</div></section>
    <section><div class="sec-h"><h2>B4 · Product codes preparados</h2></div><div class="card"><div class="bars">
      ${stack('Canónicos nuevos', TIPOS.map(t=>q('ambas','creacion_productcodes',t)), TIPOS, COLS,
              Math.max(1,TIPOS.reduce((a,t)=>a+q('ambas','creacion_productcodes',t),0)))}
    </div>${legendTipos}</div></section>
  </div>
  <div class="bloque"><div class="eyebrow">Pérdidas del tronco común</div>
    <p class="desc">Descartados por filtros de calidad antes de llegar a un flujo. La cuarentena MV no está aquí (pertenece al Flujo A).</p>
    <section><div class="card">${grouped(grpCat('destino_final','perdidas'))}</div></section>
  </div>`;
}
render();

/* tooltip que sigue al mouse (delegado, sobrevive re-renders) */
const tip = $('tip');
document.addEventListener('mousemove', e => {
  const t = e.target.closest('[data-tip]');
  if (!t) { tip.style.display = 'none'; return; }
  tip.textContent = t.dataset.tip;
  tip.style.display = 'block';
  tip.style.left = Math.min(e.clientX + 14, innerWidth - tip.offsetWidth - 8) + 'px';
  tip.style.top = (e.clientY + 14) + 'px';
});
</script>
</body>
</html>
